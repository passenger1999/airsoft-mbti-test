<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-ASTI 3.2 SONAR</title>
    <style>
        :root { --main-color: #00ff41; --bg-color: #050505; --warn-color: #ff3300; }
        body { background-color: var(--bg-color); color: var(--main-color); font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; margin: 0; padding: 10px; line-height: 1.5; }
        .sonar-panel { width: 100%; max-width: 500px; border: 2px solid #333; padding: 20px; background: #000; box-shadow: 0 0 20px rgba(0, 255, 65, 0.1); margin: 20px auto; }
        h1 { font-size: 0.8rem; text-align: center; margin: 0 0 20px 0; border-bottom: 1px solid #333; padding-bottom: 10px; color: #555; letter-spacing: 3px; }
        .result-view { font-size: 1.1rem; text-align: center; margin-bottom: 20px; color: #fff; border: 1px solid #222; padding: 12px; background: #0a0a0a; min-height: 25px; letter-spacing: 1px; }
        .q-text { font-size: 1.1rem; margin-bottom: 20px; color: var(--main-color); border-left: 4px solid var(--main-color); padding-left: 12px; font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #111; border: 1px solid #444; color: var(--main-color); padding: 15px 5px; cursor: pointer; font-size: 0.9rem; transition: 0.1s; }
        button:hover { background: #222; border-color: var(--main-color); }
        button:active { background: #00ff41; color: #000; }
        .final-area { display: none; padding-bottom: 30px; }
        .title-box { text-align: center; border: 2px double var(--warn-color); padding: 20px; margin-bottom: 25px; background: #1a0000; }
        .title-box h2 { font-size: 0.8rem; margin: 0; color: var(--warn-color); text-transform: uppercase; }
        .user-title { font-size: 1.8rem; font-weight: bold; color: #fff; margin-top: 10px; display: block; word-break: keep-all; text-shadow: 0 0 10px var(--warn-color); }
        .desc-box { background: #0a0a0a; border: 1px solid #222; padding: 15px; font-size: 0.95rem; color: #bbb; }
        .advice-card { margin-top: 20px; padding: 15px; background: #001100; border-left: 4px solid var(--main-color); color: #fff; font-style: italic; font-size: 0.9rem; }
        .restart-btn { width: 100%; background: #222; color: #888; border: 1px solid #444; padding: 15px; cursor: pointer; margin-top: 30px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="sonar-panel">
    <h1>[ A-ASTI 3.2 SCANNING SYSTEM ]</h1>
    <div id="display" class="result-view">SYSTEM_READY</div>
    
    <div id="test-area">
        <p id="question" class="q-text">분석을 시작합니다.</p>
        <div id="options" class="btn-grid">
            <button onclick="startTest()" style="grid-column: span 2;">[ 자아 스캔 시작 ]</button>
        </div>
    </div>

    <div id="result-area" class="final-area">
        <div class="title-box">
            <h2>최종 식별 호칭</h2>
            <span class="user-title" id="final-title"></span>
        </div>
        <div class="desc-box" id="final-desc"></div>
        <div class="advice-card" id="final-advice"></div>
        <button onclick="location.reload()" class="restart-btn">장비 재부팅 (REBOOT)</button>
    </div>
</div>

<script>
    let code = [];
    let step = 0;

    const questions = [
        { q: "1. 국가/감성", o: {U:"미제(USA)", R:"러시아(RUS)", E:"유럽(EUR)", K:"국산(KOR)", O:"기타"} },
        { q: "2. 주력 체급", o: {A:"소총", S:"SMG", B:"저격총", G:"지원화기", P:"권총", T:"샷건"} },
        { q: "3. 동력원", o: {G:"가스(GBB)", E:"전동(AEG)", H:"HPA", S:"탄피배출", M:"에어코킹"} },
        { q: "4. 활동 성향", o: {G:"게이머", S:"스틸챌린지", B:"방구석슈터", C:"콜렉터"} },
        { q: "5. 옵션 등급", o: {O:"오리지널", R:"레플리카", H:"하이브리드", N:"순정파"} },
        { q: "6. 외형 스타일", o: {T:"택티컬", O:"올드스쿨", M:"미니멀", S:"유니크"} },
        { q: "7. 소비 패턴", o: {I:"충동구매", P:"계획소비", S:"쟁여두기", R:"중고기변"} },
        { q: "8. 광학 철학", o: {V:"성능우선", L:"디자인", N:"무광학", M:"고배율"} },
        { q: "9. 관리 상태", o: {S:"신품급", W:"웨더링", O:"빈티지", D:"방치형"} },
        { q: "10. 최종 목표", o: {R:"리얼리즘", P:"퍼포먼스", E:"끝판왕", H:"행복찾기"} }
    ];

    // 해학적 호칭 소스
    const pre = { I:"파산 직전의", P:"신중한 척하는", S:"창고 자리가 부족한", R:"중고장터 망령" };
    const mid = { G:"반동에 미친", E:"보조배터리 노예", H:"가스통 메고 다니는", S:"탄피 줍는", M:"수동 근육" };
    const suf = { G:"야생 멧돼지", S:"종이 구멍 뚫기 장인", B:"방구석 사령관", C:"장식장 먼지떨이" };

    function startTest() { showQuestion(); }

    function showQuestion() {
        const q = questions[step];
        document.getElementById('question').innerText = `${step+1}. ${q.q}`;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        for (const [key, value] of Object.entries(q.o)) {
            const btn = document.createElement('button');
            btn.innerText = value;
            btn.onclick = () => selectOption(key);
            optionsDiv.appendChild(btn);
        }
    }

    function selectOption(key) {
        code.push(key);
        document.getElementById('display').innerText = code.join('-');
        step++;
        if (step < questions.length) showQuestion(); else showResult();
    }

    function showResult() {
        document.getElementById('test-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        
        // 호칭 로직 (해학 강화)
        let fTitle = `${pre[code[6]]} ${mid[code[2]]} ${suf[code[3]]}`;
        
        // 특수 호칭 저격
        if(code[0]==='U' && code[4]==='O' && code[3]==='B') fTitle = "방구석 델타포스";
        if(code[4]==='O' && code[6]==='I') fTitle = "트럼프 똥꼬 닦개";
        if(code[2]==='S' && code[4]==='N') fTitle = "낭만 없는 탄피 수집가";
        if(code[0]==='R' && code[3]==='G') fTitle = "시베리아 멧돼지";
        if(code[2]==='H' && code[3]==='S') fTitle = "등에 메고 다니는 외계인";

        document.getElementById('final-title').innerText = fTitle;
        
        // 설명 조립 (담백하게)
        let rText = `분석 코드: <b>${code.join('-')}</b><br><br>`;
        rText += `당신은 주로 <b>${questions[0].o[code[0]]}</b> 감성의 <b>${questions[1].o[code[1]]}</b>를 사용하며, <b>${questions[2].o[code[2]]}</b> 방식을 선호합니다.<br><br>`;
        rText += `주로 <b>${questions[3].o[code[3]]}</b>로 활동하며, 장비 세팅은 <b>${questions[4].o[code[4]]}</b>과 <b>${questions[5].o[code[5]]}</b> 스타일을 지향합니다.`;

        document.getElementById('final-desc').innerHTML = rText;

        // 유형별 한줄 조언 (해학적)
        let advice = "";
        if(code[6]==='I') advice = "💡 조언: 일단 카드를 가위로 자르는 것부터 시작합시다.";
        else if(code[2]==='S') advice = "💡 조언: 탄피 줍다가 허리 나갑니다. 파스 미리 사두세요.";
        else if(code[3]==='B') advice = "💡 조언: 방구석 타겟지도 좋지만, 가끔은 햇빛 좀 보고 사세요.";
        else if(code[4]==='O') advice = "💡 조언: 오리 광학은 죄가 없지만, 당신의 통장은 유죄입니다.";
        else if(code[7]==='M') advice = "💡 조언: 배율로 봐도 안 맞으면 그건 눈 문제가 아니라 총 문제입니다.";
        else advice = "💡 조언: 취미는 취미일 뿐, 장비 때문에 일상에 지장을 주진 맙시다.";

        document.getElementById('final-advice').innerText = advice;
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
