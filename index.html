<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에어소프트 취향 분석기 V3.2 (Final)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --main-color: #ffffff; --accent-color: #ff3300; --bg-color: #0f0f0f; --card-bg: #1a1a1a; --btn-bg: #2a2a2a; }
        body { background-color: var(--bg-color); color: var(--main-color); font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; line-height: 1.6; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; margin: 20px auto; background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); position: relative; }
        .progress-container { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-bottom: 30px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--accent-color); transition: width 0.3s ease; }
        h1 { font-size: 0.9rem; text-align: center; color: #666; letter-spacing: 2px; margin-bottom: 10px; }
        .visitor-count { text-align: center; font-size: 0.75rem; color: #555; margin-bottom: 20px; }
        .q-text { font-size: 1.3rem; margin-bottom: 30px; font-weight: 700; text-align: center; word-break: keep-all; min-height: 3.5em; display: flex; align-items: center; justify-content: center; }
        .btn-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        button { background: var(--btn-bg); border: 1px solid #333; color: #eee; padding: 16px 20px; cursor: pointer; font-size: 1rem; border-radius: 14px; transition: all 0.2s; font-weight: 500; text-align: left; opacity: 1; }
        button:hover { background: #333; border-color: var(--accent-color); transform: translateX(5px); }
        
        /* 통계 및 댓글 섹션 */
        .section-title { font-size: 0.9rem; font-weight: 800; margin: 20px 0 10px 0; color: #666; border-top: 1px solid #333; padding-top: 15px; }
        .stats-box { background: #222; border-radius: 12px; padding: 12px; margin-bottom: 20px; }
        .stat-row { margin-bottom: 8px; }
        .stat-label { font-size: 0.75rem; display: flex; justify-content: space-between; margin-bottom: 30px; }
        .stat-bar-bg { background: #333; height: 6px; border-radius: 3px; position: relative; top: -25px; }
        .stat-bar-fill { background: var(--accent-color); height: 100%; width: 0%; border-radius: 3px; transition: width 0.8s ease; }

        .comment-section { margin-top: 10px; }
        .comment-form { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .comment-input { background: #2a2a2a; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 6px; font-size: 0.8rem; }
        .comment-area { grid-column: span 2; min-height: 40px; resize: none; }
        .comment-submit { grid-column: span 2; background: #333; color: #888; border: none; padding: 8px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; text-align: center; }
        .comment-submit:hover { background: var(--accent-color); color: #fff; }
        .comment-list { max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-size: 0.8rem; }
        .comment-item { background: #1f1f1f; padding: 10px; border-radius: 8px; color: #aaa; }
        .comment-meta { font-weight: bold; color: #777; margin-bottom: 3px; font-size: 0.7rem; }

        .final-area { display: none; }
        #capture-area { padding: 15px; background: var(--card-bg); border-radius: 15px; }
        .type-badge { display: inline-block; background: var(--accent-color); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; margin-bottom: 10px; }
        .user-title { font-size: 2.1rem; font-weight: 900; margin: 10px 0 25px 0; line-height: 1.2; color: #fff; }
        .analysis-box { background: #222; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .advice-card { padding: 20px; background: #251010; border-radius: 15px; color: #ff8888; border-left: 5px solid var(--accent-color); }
        .share-group { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .share-btn { text-align: center; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; font-size: 0.9rem; }
        .primary { background: var(--accent-color); color: white; }
        .secondary { background: #444; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>에어소프트 취향 분석기 V3.2</h1>
    <div id="visitor-ui" class="visitor-count">데이터 신뢰도: <span id="total-participants">0</span>명의 분석 데이터 누적됨</div>
    <div class="progress-container"><div id="progress-fill"></div></div>
    
    <div id="test-area">
        <p id="question" class="q-text">분석 프로토콜을 가동하시겠습니까?</p>
        <div id="options" class="btn-grid">
            <button onclick="startTest()" style="text-align: center;">[ 분석 시작 ]</button>
        </div>

        <div id="step-addon" style="display:none;">
            <div class="section-title">📊 이 질문의 실시간 선택 분포</div>
            <div id="step-stats" class="stats-box"></div>

            <div class="section-title">💬 이 단계의 의견</div>
            <div class="comment-section">
                <div class="comment-form">
                    <input type="text" id="nick" class="comment-input" placeholder="닉네임">
                    <input type="password" id="pw" class="comment-input" placeholder="비번">
                    <textarea id="msg" class="comment-input comment-area" placeholder="내 의견 적기..."></textarea>
                    <button onclick="addComment()" class="comment-submit">의견 등록</button>
                </div>
                <div id="comment-list" class="comment-list"></div>
            </div>
        </div>
    </div>

    <div id="result-area" class="final-area">
        <div id="capture-area">
            <div id="type-code" class="type-badge">TYPE: UNKNOWN</div>
            <h2 class="user-title" id="final-title">분석 완료</h2>
            <div class="analysis-box" id="final-desc"></div>
            <div class="advice-card" id="final-advice"></div>
        </div>
        <div class="share-group">
            <button onclick="saveResultImage()" class="share-btn primary">결과 이미지 저장</button>
            <button onclick="location.href=location.pathname" class="share-btn secondary">다시 테스트</button>
        </div>
    </div>
</div>

<script>
const questions = [
    { id: "origin", q: "당신을 전율케 하는 총기의 혈통은?", o: {U:"천조국 [미제]", R:"불곰국 [빨갱이]", K:"[국산] K-시리즈", E:"정교한 [유럽산]"} },
    { id: "class", q: "단 한 정의 장비만 챙겨야 한다면?", o: {A:"돌격소총(AR)", S:"기관단총(SMG)", B:"저격소총(Sniper)", G:"샷건/기관총"} },
    { id: "power", q: "절대 타협할 수 없는 구동 방식은?", o: {G:"가스/HPA (반동파)", E:"전동건 (효율파)", S:"탄피배출 (피젯토이단)", M:"에어코킹 (환경보호가)"} },
    { id: "place", q: "당신의 주된 서식지는 어디인가?", o: {G:"[게임 필드]", S:"[슈팅 매치]", B:"[방구석 슈터]", C:"[컬렉터]"} }
]; // 가독성을 위해 질문 4개로 예시 구성 (전체 추가 가능)

const fragments = {
    origin: { U: "미제 앞잡이고", R: "빨갱이고", K: "K-짬내 진동하는", E: "콧대 높은 유럽산" },
    power: { G: "프로판 중독", E: "윙탁이", S: "탄피 수집광", M: "환경운동가" },
    place: { G: "필드의 전사", S: "매치 슈터", B: "방구석 요원", C: "박물관장" }
};

let currentStep = 0;
let responses = [];

// 초기 방문자 수 로드
document.getElementById('total-participants').innerText = localStorage.getItem('total_runs') || "1,240";

function startTest() {
    currentStep = 0;
    responses = [];
    document.getElementById('step-addon').style.display = 'block';
    renderQuestion();
}

function renderQuestion() {
    const q = questions[currentStep];
    const progress = (currentStep / questions.length) * 100;
    document.getElementById('progress-fill').style.width = `${progress}%`;
    document.getElementById('question').innerText = q.q;
    
    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';
    
    Object.entries(q.o).forEach(([key, value]) => {
        const btn = document.createElement('button');
        btn.innerText = value;
        btn.onclick = () => {
            responses.push(key);
            saveStepData(q.id, key); // 통계 저장
            if (currentStep + 1 < questions.length) {
                currentStep++;
                renderQuestion();
            } else {
                showResult();
            }
        };
        optionsDiv.appendChild(btn);
    });

    loadStepStats(q.id);
    loadStepComments(q.id);
}

// [통계] 단계별 데이터 저장 및 로드
function saveStepData(qId, selectedKey) {
    let stats = JSON.parse(localStorage.getItem(`stats_${qId}`)) || {};
    stats[selectedKey] = (stats[selectedKey] || 0) + 1;
    localStorage.setItem(`stats_${qId}`, JSON.stringify(stats));
}

function loadStepStats(qId) {
    const stats = JSON.parse(localStorage.getItem(`stats_${qId}`)) || {};
    const total = Object.values(stats).reduce((a, b) => a + b, 0) || 1;
    const q = questions[currentStep];
    
    const target = document.getElementById('step-stats');
    target.innerHTML = '';

    Object.entries(q.o).forEach(([key, name]) => {
        const count = stats[key] || 0;
        const percent = Math.round((count / total) * 100);
        target.innerHTML += `
            <div class="stat-row">
                <div class="stat-label"><span>${name}</span><span>${percent}%</span></div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${percent}%"></div></div>
            </div>
        `;
    });
}

// [댓글] 단계별 댓글 기능
function addComment() {
    const qId = questions[currentStep].id;
    const nick = document.getElementById('nick').value;
    const msg = document.getElementById('msg').value;

    if(!nick || !msg) return;

    const comment = { nick, msg, date: new Date().toLocaleTimeString() };
    let comments = JSON.parse(localStorage.getItem(`comments_${qId}`)) || [];
    comments.unshift(comment);
    localStorage.setItem(`comments_${qId}`, JSON.stringify(comments));

    document.getElementById('msg').value = '';
    loadStepComments(qId);
}

function loadStepComments(qId) {
    const comments = JSON.parse(localStorage.getItem(`comments_${qId}`)) || [];
    const target = document.getElementById('comment-list');
    target.innerHTML = comments.map(c => `
        <div class="comment-item">
            <div class="comment-meta">${c.nick} (${c.date})</div>
            <div>${c.msg}</div>
        </div>
    `).join('');
}

function showResult() {
    // 총 방문자 수 증가
    let runs = parseInt(localStorage.getItem('total_runs') || "1240");
    localStorage.setItem('total_runs', runs + 1);

    document.getElementById('test-area').style.display = 'none';
    document.getElementById('result-area').style.display = 'block';
    
    const code = responses;
    document.getElementById('type-code').innerText = `TYPE: ${code.join('')}`;
    document.getElementById('final-title').innerText = `${fragments.origin[code[0]]} ${fragments.power[code[2]]} ${fragments.place[code[3]]}`;
    document.getElementById('final-desc').innerHTML = `분석 결과 당신은 ${questions[0].o[code[0]]} 계열의 장비를 선호하며, ${questions[2].o[code[2]]} 방식을 고수하는 유저입니다.`;
    document.getElementById('final-advice').innerText = "💡 조언: 장비는 거들 뿐, 결국 중요한 건 당신의 실력입니다.";
}

function saveResultImage() {
    const area = document.getElementById('capture-area');
    html2canvas(area, { backgroundColor: '#1a1a1a', scale: 2 }).then(canvas => {
        const link = document.createElement('a');
        link.download = `airsoft-result.png`;
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>
</body>
</html>
