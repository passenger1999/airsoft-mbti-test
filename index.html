<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>에어소프트 취향 분석기 V4.0 (Firebase)</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* 기존 스타일 유지 */
        :root { --main-color: #ffffff; --accent-color: #ff3300; --bg-color: #0f0f0f; --card-bg: #1a1a1a; --btn-bg: #2a2a2a; }
        body { background-color: var(--bg-color); color: var(--main-color); font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; line-height: 1.6; overflow-x: hidden; touch-action: manipulation; }
        .container { width: 100%; max-width: 500px; margin: 20px auto; background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); position: relative; box-sizing: border-box; }
        .progress-container { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-bottom: 30px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--accent-color); transition: width 0.3s ease; }
        h1 { font-size: 0.9rem; text-align: center; color: #666; letter-spacing: 2px; margin-bottom: 10px; }
        .q-text { font-size: 1.3rem; margin-bottom: 30px; font-weight: 700; text-align: center; word-break: keep-all; min-height: 3.5em; display: flex; align-items: center; justify-content: center; }
        .btn-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }
        button { background: var(--btn-bg); border: 1px solid #333; color: #eee; padding: 16px 20px; cursor: pointer; font-size: 1rem; border-radius: 14px; transition: all 0.2s; font-weight: 500; text-align: left; animation: slideIn 0.4s ease forwards; opacity: 0; position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        button:hover { background: #333; border-color: var(--accent-color); transform: translateX(5px); }
        button:active { transform: scale(0.98); }
        
        .stat-container { margin-top: 50px; padding-top: 20px; border-top: 1px solid #333; }
        .stat-title { font-size: 0.8rem; color: #888; margin-bottom: 15px; text-align: center; font-weight: 600; }
        .stat-item { margin-bottom: 12px; }
        .stat-info { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 5px; color: #aaa; }
        .stat-track { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .stat-fill { height: 100%; background: var(--accent-color); opacity: 0.6; transition: width 1s ease-out; width: 0; }

        .reliability-info { margin-top: 20px; font-size: 0.7rem; color: #555; text-align: center; }

        /* 댓글 스타일 */
        .comment-section { margin-top: 40px; border-top: 1px dashed #444; padding-top: 20px; }
        .comment-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .comment-input { background: #222; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; font-size: 0.85rem; }
        .comment-textarea { grid-column: span 2; background: #222; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; min-height: 60px; resize: none; font-size: 0.9rem; }
        .comment-list { margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .comment-item { background: #1f1f1f; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-bottom: 1px solid #2a2a2a; }
        .comment-meta { font-size: 0.75rem; color: var(--accent-color); margin-bottom: 5px; font-weight: 700; }
        .comment-body { font-size: 0.85rem; color: #bbb; }

        .final-area { display: none; }
        #capture-area { padding: 15px; background: var(--card-bg); border-radius: 15px; }
        .type-badge { display: inline-block; background: var(--accent-color); color: white; padding: 6px 16px; border-radius: 20px; font-size: 1.0rem; font-weight: 800; margin-bottom: 10px; }
        .user-title { font-size: 2.1rem; font-weight: 900; margin: 10px 0 25px 0; line-height: 1.2; word-break: keep-all; color: #fff; }
        .analysis-box { background: #222; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .analysis-item { font-size: 0.95rem; color: #ccc; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 8px; }
        .analysis-item b { color: var(--accent-color); white-space: nowrap; }
        .advice-card { padding: 20px; background: #251010; border-radius: 15px; color: #ff8888; font-size: 1rem; border-left: 5px solid var(--accent-color); position: relative; }
        .share-btn { text-align: center; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; font-size: 0.9rem; }
        .primary { background: var(--accent-color); color: white; }
        .secondary { background: #444; color: white; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>에어소프트 취향 분석기 V4.0</h1>
    <div class="progress-container"><div id="progress-fill"></div></div>
    
    <div id="test-area">
        <p id="question" class="q-text">데이터 로딩 중...</p>
        <div id="options" class="btn-grid"></div>
        <div id="item-stats" style="display:none;">
            <div class="stat-container">
                <div class="stat-title">전체 유저 선택 실시간 통계</div>
                <div id="stat-list"></div>
            </div>
            <div class="reliability-info">누적 데이터 기반 실시간 반영</div>
        </div>
    </div>

    <div id="result-area" class="final-area">
        <div id="capture-area">
            <div id="type-code" class="type-badge">TYPE: CALC</div>
            <h2 class="user-title" id="final-title">분석 완료</h2>
            <div class="analysis-box" id="final-desc"></div>
            <div class="advice-card" id="final-advice"></div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
            <button onclick="saveResultImage()" class="share-btn primary" style="opacity:1;">결과 이미지 저장</button>
            <button onclick="location.reload()" class="share-btn secondary" style="opacity:1;">다시 하기</button>
        </div>

        <div class="comment-section">
            <div class="comment-form">
                <input type="text" id="cmt-nick" class="comment-input" placeholder="닉네임">
                <textarea id="cmt-text" class="comment-textarea" placeholder="당신의 분석 결과는 어떤가요?"></textarea>
                <button onclick="addComment()" class="share-btn primary" style="grid-column: span 2; opacity: 1; text-align: center;">댓글 등록</button>
            </div>
            <div id="comment-list" class="comment-list"></div>
        </div>
    </div>
</div>

<script>
// 업로드해주신 정보를 바탕으로 설정 완료 
const firebaseConfig = {
  apiKey: "AIzaSyDtbu7D79svCC2prd43o2KblmvVCKHrPaU",
  authDomain: "airsoft-mbti-test.firebaseapp.com",
  projectId: "airsoft-mbti-test",
  storageBucket: "airsoft-mbti-test.firebasestorage.app",
  messagingSenderId: "484009000199",
  appId: "1:484009000199:web:dc9fb59debbc9fb8f259a2",
  measurementId: "G-6WD1HNZJXZ"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const questions = [
    { id: "origin", q: "당신을 전율케 하는 총기의 혈통은?", o: {U:"천조국 [미제]", R:"불곰국 [빨갱이]", K:"[국내산] 제철 K-시리즈", E:"정교한 [유럽산] 엔지니어링"} },
    { id: "class", q: "단 한 정의 장비만 챙겨야 한다면?", o: {A:"돌격소총(AR)", S:"기관단총(SMG)", B:"저격소총(Sniper)", G:"샷건/기관총"} },
    { id: "power", q: "절대 타협할 수 없는 구동 방식은?", o: {G:"가스/HPA (반동파)", E:"전동건 (효율파)", S:"탄피배출 (피젯토이단)", M:"에어코킹 (환경보호가)"} },
    { id: "place", q: "당신의 주된 서식지는 어디인가?", o: {G:"[서바이벌 게임 필드]", S:"[슈팅 매치/스틸 챌린지]", B:"[침대 위 방구석 슈터]", C:"[컬렉터]"} },
    { id: "optic", q: "현재 장착된 옵션의 실체는?", o: {O:"[오리지널] 실물", R:"가성비 [레플리카]", H:"중요 부위만 실물인 [하이브리드]", N:"아무것도 안 올린 [순정]"} },
    { id: "style", q: "추구하는 장비의 외형적 미학은?", o: {T:"백화점 [택티컬]", O:"낭만의 [올드스쿨]", M:"최소한의 [미니멀리즘]", S:"[기능우선주의]"} },
    { id: "money", q: "당신의 평소 소비 상태는?", o: {I:"대책 없는 [충동구매]", P:"치밀한 [계획소비]", S:"[일단 훔치기]", R:"[중고장터 매복팀]"} },
    { id: "aim", q: "조준경에 대한 당신의 철학은?", o: {V:"[레드도트 사이트]", N:"[아이언 사이트]", L:"[야동 사이트]", M:"[배율 스코프]"} },
    { id: "care", q: "장비 관리 상태를 한마디로?", o: {S:"기스 하나 없는 [신품급]", W:"일부러 긁는 [웨더링]", O:"세월이 만든 [빈티지]", D:"격발만 되면 [장땡]"} },
    { id: "end", q: "에어소프트 취미의 끝은 무엇인가?", o: {R:"[외형]", P:"[집탄]", E:"[내구]", H:"[반동]"} }
];

const specialTitles = [
    { condition: (c) => c[0]==='K' && c[5]==='O', title: "국방부 고증 5분 대기조" },
    { condition: (c) => c[0]==='R' && c[6]==='S', title: "러시아 장비 훔쳐다 파는 간첩" },
    { condition: (c) => c[0]==='U' && c[4]==='O', title: "트럼프 똥꼬 닦개" },
    { condition: (c) => c[2]==='G' && c[3]==='G', title: "가스 반동에 뇌수 흘리는 광인" },
    { condition: (c) => c[2]==='G' && c[9]==='H', title: "뇌 흔들리는 반동에 중독된 가스 중독자" },
    { condition: (c) => c[2]==='S' && c[3]==='G', title: "필드에서 탄피 줍는 이삭 줍는 여인" },
    { condition: (c) => c[2]==='S' && c[9]==='H', title: "탄피 반동에 전립선 자극받는 변태" },
    { condition: (c) => c[3]==='B' && c[7]==='M', title: "유튜브로 사격 배운 방구석 데브그루" },
    { condition: (c) => c[4]==='N' && c[7]==='N', title: "순정에 미친 광기의 미니멀리스트" },
    { condition: (c) => c[4]==='O' && c[6]==='I', title: "카드값보다 렌즈가 소중한 파산자" },
    { condition: (c) => c[6]==='I' && c[4]==='O', title: "카드값보다 렌즈 투과율이 소중한 파산자" },
    { condition: (c) => c[6]==='R' && c[8]==='D', title: "중고장터의 하이에나" },
    { condition: (c) => c[6]==='S' && c[7]==='L', title: "총 훔쳐서 야동 보는 사회부적응자" },
    { condition: (c) => c[6]==='R' && c[4]==='R', title: "남이 쓰다 버린 쓰레기 줍는 하이에나" },
    { condition: (c) => c[6]==='S', title: "필드의 대도(大盜)" },
    { condition: (c) => c[7]==='L', title: "야동 확대범" },
    { condition: (c) => c[7]==='L' && c[3]==='B', title: "조준경으로 야동 보며 딸치는 방구석 특수부대" },
    { condition: (c) => c[8]==='S' && c[3]==='C', title: "기스 날까 봐 박스에만 모시는 상전님" },
    { condition: (c) => c[9]==='P' && c[7]==='M', title: "타겟지에 구멍 하나만 뚫으려는 결벽증 요원" }
];

const fragments = {
    origin: { U: "미제 앞잡이고", R: "빨갱이고", K: "K-짬내 진동하는 총을 사고", E: "콧대 높은 유럽산을 애용하고" },
    power: { G: "프로판 붙들고 사는", E: "윙탁거리는", S: "탄피에 집착하는", M: "돈이 없는" },
    place: { G: "게이머", S: "자칭 사격선수", B: "방구석 델타포스", C: "소믈리에" }
};

let responses = [];

window.onload = () => {
    const optionsDiv = document.getElementById('options');
    document.getElementById('question').innerText = "분석을 시작하시겠습니까?";
    optionsDiv.innerHTML = `<button onclick="startTest()" style="text-align: center; opacity:1;">[ 분 석 시 작 ]</button>`;
    loadComments();
};

function startTest() {
    responses = [];
    document.getElementById('item-stats').style.display = 'block';
    renderQuestion(0);
}

async function renderQuestion(step) {
    const q = questions[step];
    document.getElementById('progress-fill').style.width = `${(step / questions.length) * 100}%`;
    document.getElementById('question').innerText = q.q;
    
    const optionsDiv = document.getElementById('options');
    const statList = document.getElementById('stat-list');
    optionsDiv.innerHTML = '';
    statList.innerHTML = '통계 로딩 중...';

    // Firebase 통계 가져오기
    const docRef = db.collection("stats").doc(q.id);
    const doc = await docRef.get();
    let statData = doc.exists ? doc.data() : {};
    let total = Object.values(statData).reduce((a, b) => a + b, 0) || 1;

    statList.innerHTML = '';
    Object.entries(q.o).forEach(([key, value], index) => {
        const btn = document.createElement('button');
        btn.innerText = value;
        btn.style.animationDelay = `${index * 0.1}s`;
        btn.onclick = async () => {
            await docRef.set({ [key]: firebase.firestore.FieldValue.increment(1) }, { merge: true });
            responses.push(key);
            if (step + 1 < questions.length) renderQuestion(step + 1);
            else showResult();
        };
        optionsDiv.appendChild(btn);

        const count = statData[key] || 0;
        const percent = Math.round((count / total) * 100);
        const statItem = document.createElement('div');
        statItem.className = 'stat-item';
        statItem.innerHTML = `
            <div class="stat-info"><span>${value}</span><span>${percent}%</span></div>
            <div class="stat-track"><div class="stat-fill" style="width: ${percent}%"></div></div>
        `;
        statList.appendChild(statItem);
    });
}

function showResult() {
    document.getElementById('test-area').style.display = 'none';
    document.getElementById('result-area').style.display = 'block';
    const code = responses;
    document.getElementById('type-code').innerText = `TYPE: ${code.join('')}`;

    let fTitle = `${fragments.origin[code[0]]} ${fragments.power[code[2]]} ${fragments.place[code[3]]}`;
    for (const sp of specialTitles) {
        if (sp.condition(code)) { fTitle = sp.title; break; }
    }
    document.getElementById('final-title').innerText = fTitle;

    document.getElementById('final-desc').innerHTML = `
        <div class="analysis-item"><b>취향:</b> ${questions[0].o[code[0]]} / ${questions[5].o[code[5]]}</div>
        <div class="analysis-item"><b>성향:</b> ${questions[3].o[code[3]]} 에서 ${questions[7].o[code[7]]} 애용</div>
        <div class="analysis-item"><b>소비:</b> ${questions[6].o[code[6]]} (으)로 ${questions[4].o[code[4]]} 구매</div>
    `;

    let advice = "💡 조언: ";
    if(code[6]==='S') advice += "남의 장비 훔치지 말고 성실하게 사세요. 은팔찌 차고 싶습니까?";
    else if(code[7]==='L') advice += "조준경으로 표적을 보세요. 야동 보라고 있는 거 아닙니다.";
    else if(code[0]==='K') advice += "K-시리즈 고증은 PTSD입니다. 적당히 하세요.";
    else if(code[3]==='B') advice += "총은 죄가 없습니다. 당신의 뱃살과 귀찮음이 죄입니다.";
    else if(code[8]==='S') advice += "기스 무서우면 그냥 박스에 가둬두세요. 그게 총입니까, 상전입니까?";
    else advice += "장비 탓하기 전에 사격장 가서 연습이나 더 하세요.";
    document.getElementById('final-advice').innerText = advice;
}

// 댓글 시스템 구현
async function addComment() {
    const nick = document.getElementById('cmt-nick').value;
    const text = document.getElementById('cmt-text').value;
    if(!nick || !text) return alert("내용을 입력해주세요.");

    await db.collection("comments").add({
        nickname: nick,
        content: text,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById('cmt-nick').value = '';
    document.getElementById('cmt-text').value = '';
}

function loadComments() {
    db.collection("comments").orderBy("timestamp", "desc").limit(30).onSnapshot((snapshot) => {
        const list = document.getElementById('comment-list');
        list.innerHTML = '';
        snapshot.forEach((doc) => {
            const data = doc.data();
            const item = document.createElement('div');
            item.className = 'comment-item';
            item.innerHTML = `<div class="comment-meta">${data.nickname}</div><div class="comment-body">${data.content}</div>`;
            list.appendChild(item);
        });
    });
}

function saveResultImage() {
    const area = document.getElementById('capture-area');
    html2canvas(area, { backgroundColor: '#1a1a1a', scale: 2 }).then(canvas => {
        const link = document.createElement('a');
        link.download = `airsoft-result-${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
}
</script>
</body>
</html>
