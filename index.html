<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A-ASTI 4.0</title>
<style>
:root { --main:#fff; --bg:#121212; --card:#1e1e1e; --accent:#ff3300; }
body { background:var(--bg); color:var(--main); font-family:sans-serif; margin:0; padding:20px; }
.container { max-width:480px; margin:auto; background:var(--card); padding:30px; border-radius:16px; }
.q-text { font-size:1.2rem; margin-bottom:20px; }
button { width:100%; margin:6px 0; padding:16px; border:none; border-radius:10px; background:#2a2a2a; color:#fff; cursor:pointer; }
button:hover { background:#3a3a3a; }
.progress { text-align:center; margin-bottom:10px; color:#777; }
.result { display:none; }
.bar { height:6px; background:#333; border-radius:10px; overflow:hidden; margin-bottom:15px; }
.bar-inner { height:100%; background:var(--accent); width:0%; }
</style>
</head>
<body>
<div class="container">
<div class="progress" id="progress">START</div>
<div class="bar"><div class="bar-inner" id="bar"></div></div>
<div id="test"></div>
<div id="result" class="result">
<h2 id="title"></h2>
<p id="type"></p>
<p id="desc"></p>
<p id="advice"></p>
<button onclick="shareResult()">공유하기</button>
<button onclick="location.reload()">다시하기</button>
</div>
</div>

<script>
let step=0, code=[];

const questions=[
{q:"총기 출신 취향은?",o:{U:"미제",R:"러시아",K:"국산",O:"기타"}},
{q:"선호 체급은?",o:{A:"AR",S:"SMG",B:"저격",G:"샷건"}},
{q:"작동 방식은?",o:{G:"가스",E:"전동",S:"탄피",M:"수동"}},
{q:"플레이 스타일은?",o:{G:"필드",S:"사격",B:"집",C:"수집"}},
{q:"옵션 스타일은?",o:{O:"실물",R:"레플",H:"혼합",N:"순정"}},
{q:"취향은?",o:{T:"택티컬",O:"올드",M:"미니멀",S:"괴상"}},
{q:"소비 성향은?",o:{I:"충동",P:"계획",S:"수집",R:"중고"}},
{q:"조준 방식은?",o:{V:"도트",L:"간지",N:"기본",M:"고배율"}},
{q:"관리 스타일은?",o:{S:"신품",W:"웨더링",O:"빈티지",D:"막씀"}},
{q:"최종 목표는?",o:{R:"리얼",P:"성능",E:"컬렉션",H:"행복"}}
];

const pre={I:"통장파괴",P:"계획형",S:"수집광",R:"장터러"};
const mid={G:"반동중독",E:"효율충",S:"탄피변태",M:"근육파"};
const suf={G:"야수",S:"사격러",B:"방구석",C:"콜렉터"};

const specialTitles=[
{cond:(c)=>c[4]==='O'&&c[6]==='I',title:"실물충동 파산러"},
{cond:(c)=>c[2]==='S'&&c[8]==='S',title:"탄피 집착 장인"},
{cond:(c)=>c[3]==='B'&&c[6]==='P',title:"고독한 분석가"}
];

function render(){
let q=questions[step];
document.getElementById('progress').innerText=`${step+1}/${questions.length}`;
document.getElementById('bar').style.width=((step/questions.length)*100)+"%";
let html=`<div class='q-text'>${q.q}</div>`;
for(let k in q.o){
html+=`<button onclick="select('${k}')">${q.o[k]}</button>`;
}
document.getElementById('test').innerHTML=html;
}

function select(k){
code.push(k);
step++;
if(step<questions.length) render(); else result();
}

function result(){
document.getElementById('test').style.display='none';
document.getElementById('result').style.display='block';

let typeCode=code.join('');
let title=`${pre[code[6]]} ${mid[code[2]]} ${suf[code[3]]}`;

for(let s of specialTitles){ if(s.cond(code)) title=s.title; }

let desc="";
if(code[3]==='G') desc+="필드 중심 플레이어. ";
if(code[3]==='C') desc+="수집형 성향 강함. ";
if(code[6]==='I') desc+="충동구매 성향. ";
if(code[6]==='P') desc+="계획형 소비자. ";

let advice="";
if(code[6]==='I') advice="지출 관리 필요";
else if(code[2]==='S') advice="탄피 집착 줄이기";
else advice="장비보다 실력";

// URL 공유용
let url=location.origin+location.pathname+"?r="+typeCode;

// 출력

document.getElementById('title').innerText=title;
document.getElementById('type').innerText="유형 코드: "+typeCode;
document.getElementById('desc').innerText=desc;
document.getElementById('advice').innerText=advice;

history.replaceState(null,null,"?r="+typeCode);
}

function shareResult(){
if(navigator.share){
navigator.share({title:"A-ASTI 결과",text:"내 유형 확인",url:location.href});
}else{
prompt("링크 복사",location.href);
}
}

// 결과 바로 보기
const params=new URLSearchParams(location.search);
if(params.get('r')){
code=params.get('r').split('');
result();
}else{
render();
}
</script>
</body>
</html>
