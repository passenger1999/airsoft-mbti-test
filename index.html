<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ A-ASTI 3.0 SONAR ]</title>
    <style>
        /* 기본 베이스: 심해처럼 어둡고 침침하게 */
        :root { --main-color: #00ff41; --bg-color: #050505; --warn-color: #ff3300; --panel-color: #1a1a1a; }
        body { background-color: var(--bg-color); color: var(--main-color); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; overflow: hidden; }
        
        /* 장비 패널 감성 (노이즈 효과) */
        .sonar-panel { width: 100%; max-width: 600px; border: 4px solid #333; padding: 25px; background: rgba(10, 20, 10, 0.95); border-radius: 5px; box-shadow: 0 0 50px rgba(0, 255, 65, 0.1); position: relative; overflow: hidden; }
        .sonar-panel::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1) 1px, transparent 1px, transparent 2px); pointer-events: none; }
        
        h1 { font-size: 1rem; text-align: center; margin: 0 0 25px 0; border-bottom: 2px solid #333; padding-bottom: 10px; letter-spacing: 5px; color: #aaa; text-transform: uppercase; }
        .result-view { font-size: 1.2rem; text-align: center; margin-bottom: 30px; color: #fff; text-shadow: 0 0 10px var(--main-color); border: 1px solid #222; padding: 15px; background: #000; min-height: 35px; animation: glitch 0.2s ease-in-out infinite alternate; }
        .q-text { font-size: 1.1rem; margin-bottom: 20px; color: var(--main-color); text-align: left; line-height: 1.4; border-left: 5px solid var(--main-color); padding-left: 15px; }
        
        /* 버튼 디자인 (기계적인 느낌) */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { background: #111; border: 2px solid #333; color: var(--main-color); padding: 16px; cursor: pointer; font-size: 0.9rem; transition: 0.1s; text-transform: uppercase; position: relative; }
        button:hover { background: #222; border-color: var(--main-color); color: #fff; box-shadow: 0 0 10px rgba(0, 255, 65, 0.5); }
        button:active { transform: scale(0.98); background: #000; }

        /* 결과 화면 디자인 (최종 리포트) */
        .final-area { display: none; text-align: left; }
        .title-box { text-align: center; border: 2px solid var(--warn-color); padding: 15px; margin-bottom: 25px; background: #220000; color: #fff; }
        .title-box h2 { font-size: 0.9rem; margin: 0; color: var(--warn-color); letter-spacing: 2px; }
        .user-title { font-size: 2.2rem; font-weight: bold; color: #fff; text-shadow: 0 0 15px var(--warn-color); margin-top: 10px; display: block; }
        
        .desc-box { background: #000; border: 1px solid #333; padding: 20px; font-size: 0.85rem; line-height: 2; color: #ccc; position: relative; }
        .desc-box::before { content: "DATA_ANALYSIS"; position: absolute; top: -10px; left: 15px; background: #000; padding: 0 10px; color: #555; font-size: 0.7rem; }
        
        .highlight { color: #fff; font-weight: bold; background: #004400; padding: 0 4px; }
        .warn { color: var(--warn-color); font-weight: bold; animation: flicker 0.5s infinite; }
        .restart-btn { margin-top: 25px; width: 100%; background: var(--warn-color); color: #000; font-weight: bold; border: none; padding: 18px; cursor: pointer; border-radius: 2px; text-transform: uppercase; font-size: 1rem; }

        /* 애니메이션 효과 (글릿치, 깜빡임) */
        @keyframes glitch { 0% { text-shadow: 2px 0 var(--warn-color), -2px 0 blue; } 100% { text-shadow: -2px 0 var(--warn-color), 2px 0 blue; } }
        @keyframes flicker { 0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; } 20%, 22%, 24%, 55% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="sonar-panel">
    <h1>[ A-ASTI 3.0 SONAR SYSTEM ]</h1>
    <div id="display" class="result-view">AWAITING_SONAR_PULSE_</div>
    
    <div id="test-area">
        <p id="question" class="q-text">잠수함 소나 장비가 당신의 에어소프트 자아를 탐지합니다.</p>
        <div id="options" class="btn-grid">
            <button onclick="startTest()" style="grid-column: span 2;">[ INIT_SCAN ]</button>
        </div>
    </div>

    <div id="result-area" class="final-area">
        <div class="title-box">
            <h2>- 최종 분석 호칭 -</h2>
            <span class="user-title" id="final-title"></span>
        </div>
        <div class="desc-box" id="final-desc"></div>
        <button onclick="location.reload()" class="restart-btn">[ REBOOT_SONAR ]</button>
    </div>
</div>

<script>
    let code = [];
    let step = 0;

    const questions = [
        { q: "1. Soul (어느 나라의 철학입니까?)", o: {U:"미제/서방", R:"러시아/동구", E:"유럽제(HK/SIG)", K:"국산(K-시리즈)", O:"그외"} },
        { q: "2. Class (주력 체급은?)", o: {A:"소총(AR/AK)", S:"SMG/컴팩트", B:"저격총(Bolt)", G:"지원화기(LMG)", P:"권총(Pistol)", T:"샷건(Shotgun)"} },
        { q: "3. Mechanism (무엇으로 움직입니까?)", o: {G:"가스(GBB)", E:"전동(AEG)", H:"HPA(고압)", S:"탄피배출", M:"에어코킹"} },
        { q: "4. Identity (주된 활동은?)", o: {G:"게이머", S:"스틸챌린지", B:"방구석슈터", C:"콜렉터"} },
        { q: "5. Parts (옵션의 순수성은?)", o: {O:"오리지널(Real)", R:"레플리카", H:"하이브리드", N:"순정파"} },
        { q: "6. Vibe (추구하는 외형 느낌은?)", o: {T:"택티컬", O:"올드스쿨", M:"미니멀", S:"유니크/SF"} },
        { q: "7. Spending (소비 패턴은?)", o: {I:"충동구매", P:"계획소비", S:"쟁여두기", R:"중고기변"} },
        { q: "8. Attachment (광학 철학은?)", o: {V:"성능우선", L:"디자인우선", N:"무광학", M:"고배율/망원"} },
        { q: "9. Condition (관리 상태는?)", o: {S:"신품급/박스풀", W:"전투흔적/웨더링", O:"빈티지/헤리티지", D:"방치형"} },
        { q: "10. Final Goal (최종 목표는?)", o: {R:"리얼리즘", P:"퍼포먼스", E:"끝판왕장비", H:"즐거운취미"} }
    ];

    const dataDB = {
        S1: { U:"미제 장비의 실전성을 맹신하며,", R:"불곰국의 투박한 쇠 냄새에 취해 있으며,", E:"유럽제의 세련된 성능을 추구하며,", K:"K-시리즈에 애국심을 불태우며,", O:"남들과는 다른 독자적인 노선을 걷는" },
        S2: { A:"AR/AK류 돌격소총을 주력으로 다루는", S:"빠른 기동성의 SMG를 선호하는", B:"한 발의 정밀함에 목숨 거는 스나이퍼형", G:"압도적인 화력으로 밀어붙이는 건너형", P:"권총 한 자루면 충분한 미니멀리스트", T:"샷건의 작동 손맛에 중독된" },
        S3: { G:"반동에 영혼을 판 GBB 애호가.", E:"신뢰성을 중시하는 실용적인 전동건 유저.", H:"반응 속도의 끝을 보는 HPA 외계인.", S:"탄피 줍는 수고를 감수하는 낭만파.", M:"팔 근육과 스프링만 믿는 고독한 사수." },
        S4: { G:"필드의 최전선에서 구르는 게 낙인 야생형 유저입니다.", S:"0.01초를 다투는 정밀 사격의 달인이군요.", B:"방구석 사격장의 지배자이자 타겟지의 저승사자입니다.", C:"장식장의 조명을 받으며 빛나는 총기를 감상하는 박물관장님입니다." },
        S5: { O:"모든 옵션은 '오리지널'이어야만 만족하는 파산 직전의 완벽주의자군요.", R:"가성비 레플리카로 스마트하게 장비를 꾸리는 실속파입니다.", H:"보여지는 건 실물로, 소모품은 레플로 타협하는 하이 리스크-로우 리턴형 유저입니다.", N:"'순정이 곧 튜닝의 끝'이라 믿는 순수주의자입니다." },
        S6: { T:"최신 전술 장비로 풀세팅된 택티컬의 정점!", O:"나무와 가죽, 철제의 조화를 즐기는 올드스쿨의 후예!", M:"거추장스러운 건 다 떼버리는 미니멀리즘 전사!", S:"남들은 이해 못 하는 본인만의 독특한 세계관을 구축 중!" },
        S7: { I:"일단 지르고 카드 고지서를 보며 반성하는 충동구매의 화신.", P:"한 달간 리뷰를 섭렵한 뒤에야 결제하는 치밀한 계획가.", S:"'단종되면 어쩔 건데?'라며 일단 쟁여두는 수집광.", R:"중고장터의 매물을 낚아채며 기변의 즐거움을 누리는 장터 사냥꾼." },
        S8: { V:"조준점의 선명도가 곧 본인의 인격이라 믿는 광학 지상주의자.", L:"성능보다 실루엣! 총과 어울리지 않는 광학은 참지 못합니다.", N:"배터리 따위는 믿지 않는, 기계식 조준기의 전설.", M:"멀리 있는 걸 당겨 봐야 총 쏘는 맛이 나는 망원경 애호가." },
        S9: { S:"기스 하나에 영혼까지 깎여나가는, 박스 풀세트급 관리 광인입니다.", W:"직접 도색을 까고 긁으며 전투 흔적을 훈장으로 여기는 웨더링 장인입니다.", O:"녹슬고 낡은 느낌에서 세월의 헤리티지를 느끼는 빈티지 마스터입니다.", D:"작동만 되면 진흙이 묻든 말든 상관하지 않는 야생의 유저입니다." },
        S10: { R:"실총과의 구분이 무의미한 극강의 리얼리즘을 지향합니다.", P:"0.1J의 오차도 허용하지 않는 최고의 퍼포먼스를 목표로 합니다.", E:"'더 이상 살 게 없는' 끝판왕 세팅을 꿈꾸는 지갑 전사입니다.", H:"남들이 뭐라든 본인이 즐거우면 그만인 진정한 취미 생활자입니다." }
    };

    // 호칭 데이터베이스 (조합별 키워드 기반)
    const titleDB = {
        Mechanism: { G:"반동 변태", E:"검증된 전사", H:"등에 메고 다니는 외계인", S:"탄피 줍는 노예", M:"고행하는 수도승" },
        Identity: { G:"필드 빌런", S:"0.01초 컷", B:"방구석 사령관", C:"박물관 관장" },
        Spending: { I:"충동 지름신", P:"치밀한 스케줄러", S:"재고 쌓는 창고", R:"기변의 황제" }
    };

    function startTest() { showQuestion(); }

    function showQuestion() {
        const q = questions[step];
        document.getElementById('question').innerText = `[SCAN_STEP_${step+1}] ${q.q}`;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        for (const [key, value] of Object.entries(q.o)) {
            const btn = document.createElement('button');
            btn.innerText = value;
            btn.onclick = () => selectOption(key);
            optionsDiv.appendChild(btn);
        }
    }

    function selectOption(key) {
        // 클릭 시 화면 깜빡임 효과 (장비 고장 연출)
        document.body.style.animation = 'flicker 0.1s ease-in-out';
        setTimeout(() => document.body.style.animation = '', 100);
        
        code.push(key);
        document.getElementById('display').innerText = code.join('-');
        step++;
        if (step < questions.length) showQuestion(); else showResult();
    }

    function showResult() {
        document.getElementById('test-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        
        // 최종 호칭 조합 Logic
        const mech = titleDB.Mechanism[code[2]]; // 동력원 기반
        const ident = titleDB.Identity[code[3]]; // 활동 성향 기반
        const spend = titleDB.Spending[code[6]]; // 소비 패턴 기반
        
        // 최종 호칭: [메커니즘] + [활동] + [소비]
        document.getElementById('final-title').innerText = `${spend} ${mech} ${ident}`;
        
        // 분석 리포트 조립
        let rText = `에어소프트 자아 코드: <span class="highlight">[ ${code.join('-')} ]</span><br><br>`;
        rText += `당신은 ${dataDB.S1[code[0]]} ${dataDB.S2[code[1]]} ${dataDB.S3[code[2]]}<br><br>`;
        rText += `분석 결과, ${dataDB.S4[code[3]]}<br><br>`;
        rText += `장비 성향은 ${dataDB.S5[code[4]]} 외형적으로는 ${dataDB.S6[code[5]]}<br><br>`;
        rText += `또한 당신은 ${dataDB.S7[code[6]]} 광학에 대해서는 ${dataDB.S8[code[7]]}<br><br>`;
        rText += `현재 장비는 ${dataDB.S9[code[8]]} 취미의 끝은 ${dataDB.S10[code[9]]}`;

        // 특수 조합 팩폭 로직 (그대로 유지)
        if(code[2] === 'S' && code[8] === 'S') rText += `<br><br><span class="warn">⚠️ [SYSTEM_ERROR] 탄피 줍는 고통과 기스 걱정 사이에서 자아분열 중입니다.</span>`;
        if(code[4] === 'O' && code[6] === 'I') rText += `<br><br><span class="warn">⚠️ [지갑_경보] 통장이 이미 사망했습니다. 하지만 오리 광학은 영롱하군요.</span>`;
        if(code[3] === 'C' && code[8] === 'D') rText += `<br><br><span class="warn">⚠️ [모순_탐지] 콜렉터인데 방치형 관리라뇨? 장식장 먼지 좀 닦으세요.</span>`;

        document.getElementById('final-desc').innerHTML = rText;
    }
</script>

</body>
</html>
