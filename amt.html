<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-ASTI 2.0 판독기</title>
    <style>
        :root { --main-color: #00ff41; --bg-color: #0d0208; }
        body { background-color: var(--bg-color); color: var(--main-color); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 500px; border: 2px solid var(--main-color); padding: 25px; background: rgba(0, 0, 0, 0.9); border-radius: 10px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.3); }
        h1 { font-size: 1.4rem; text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--main-color); padding-bottom: 10px; }
        .result-view { font-size: 1.8rem; font-weight: bold; text-align: center; margin-bottom: 30px; color: #fff; text-shadow: 0 0 8px var(--main-color); height: 40px; }
        .q-text { font-size: 1.1rem; margin-bottom: 25px; color: #ddd; text-align: center; line-height: 1.4; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { background: transparent; border: 1px solid var(--main-color); color: var(--main-color); padding: 14px; cursor: pointer; font-family: inherit; transition: 0.2s; border-radius: 4px; }
        button:hover { background: var(--main-color); color: #000; font-weight: bold; }
        .final-area { text-align: center; display: none; }
        .desc { color: #aaa; font-size: 0.95rem; line-height: 1.7; margin: 20px 0; border: 1px dashed #444; padding: 15px; text-align: left; }
        .restart-btn { margin-top: 20px; width: 100%; background: var(--main-color); color: #000; font-weight: bold; border: none; padding: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h1>[ A-ASTI 2.0 SCANNER ]</h1>
    <div id="display" class="result-view">READY_</div>
    
    <div id="test-area">
        <p id="question" class="q-text">에어소프트 자아 분석 스캔을 시작하시겠습니까?</p>
        <div id="options" class="btn-grid">
            <button onclick="startTest()" style="grid-column: span 2;">[ SCAN START ]</button>
        </div>
    </div>

    <div id="result-area" class="final-area">
        <h2 style="color:#fff;">SCAN COMPLETE</h2>
        <div class="desc" id="final-desc"></div>
        <button onclick="location.reload()" class="restart-btn">RE-SCAN</button>
    </div>
</div>

<script>
    let code = [];
    let step = 0;

    const questions = [
        { q: "1. 어느 나라의 '철학'을 따릅니까?", o: {U:"미제(USA)", R:"러시아(RUS)", E:"유럽(EUR)", K:"국산(KOR)", J:"일본(JPN)"} },
        { q: "2. 주력 화기 체급은 무엇입니까?", o: {A:"소총(AR/AK)", S:"SMG", B:"저격총", G:"지원화기", P:"권총", T:"샷건"} },
        { q: "3. 당신의 심장을 뛰게 하는 동력은?", o: {G:"가스(GBB)", E:"전동(AEG)", H:"HPA", M:"에어코킹"} },
        { q: "4. 본인은 어떤 유저 유형입니까?", o: {G:"게이머", S:"스틸챌린지", B:"방구석슈터", C:"콜렉터", H:"고증파"} },
        { q: "5. 장비 옵션의 순수성은?", o: {O:"오리지널(RS)", R:"레플리카", H:"하이브리드"} },
        { q: "6. 총을 대하는 근본적인 태도는?", o: {M:"기계변태", P:"찍사", U:"실사용파", A:"아티스트"} },
        { q: "7. 주변에 알려진 지출액은?", o: {L:"구라쟁이", W:"지갑전사", S:"자유영혼"} }
    ];

    function startTest() { showQuestion(); }

    function showQuestion() {
        const q = questions[step];
        document.getElementById('question').innerText = q.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        for (const [key, value] of Object.entries(q.o)) {
            const btn = document.createElement('button');
            btn.innerText = `${value} [${key}]`;
            btn.onclick = () => selectOption(key);
            optionsDiv.appendChild(btn);
        }
    }

    function selectOption(key) {
        code.push(key);
        document.getElementById('display').innerText = code.join('-');
        step++;
        if (step < questions.length) showQuestion(); else showResult();
    }

    function showResult() {
        document.getElementById('test-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        const fCode = code.join('-');
        let comment = `분석된 고유 코드: <b>${fCode}</b><br><br>`;
        
        // 간단한 조건별 팩폭 로직
        if(code[2] === 'G' && code[4] === 'O') comment += "📌 반동 없이는 못 사는 오리 광학 성애자군요. 지갑은 가볍지만 어깨는 든든하시겠네요.<br>";
        if(code[3] === 'B' && code[5] === 'M') comment += "📌 필드보다 책상이 익숙한 기계변태 방구석 슈터입니다. 총구보다 먼지 닦는 시간이 더 많으시죠?<br>";
        if(code[6] === 'L') comment += "📌 [경고] 허위 보고 감지. 가족/지인에게 공개한 장비 가격이 실제의 20% 미만일 확률이 매우 높습니다.<br>";
        if(code[0] === 'R') comment += "📌 동무, AK를 들고 고르카를 입으니 가슴이 뜨거워지지 않습니까? 감성 넘치는 불곰국 전사군요.<br>";
        if(code[3] === 'S') comment += "📌 0.01초의 정밀함에 목숨 거는 타겟 사격 광인입니다. 장비의 성능이 곧 본인의 인격이군요.<br>";

        comment += "<br>이 결과를 커뮤니티에 인증하여 동료들의 팩폭을 유도하십시오.";
        document.getElementById('final-desc').innerHTML = comment;
    }
</script>

</body>
</html>
